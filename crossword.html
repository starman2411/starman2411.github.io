    padding: 20px;

  .crossword {
    display: grid;
    grid-template-columns: repeat(11, 35px);
    grid-template-rows: repeat(11, 35px);
    gap: 2px;
    margin-bottom: 20px;
  }
  .cell {
    position: relative;
    width: 48px;
    height: 48px;
    border: 2px solid #333;
    background: #fff;
  }
  .cell input {
    width: 100%;
    height: 100%;
    border: none;
    text-align: center;
    font-size: 20px;
    text-transform: uppercase;
    padding: 0px;
  }
  .cell.black {
    background: #333;
  }
  .number {
    position: absolute;
    top: 2px;
    left: 2px;
    font-size: 12px;
    color: #333;

  }
  .clues {
    display: flex;
    gap: 50px;
  }
  .clues div {
    max-width: 250px;
  }
  button {
    padding: 10px 20px;
    font-size: 16px;
  }
  .crossword-wrapper {
    display: flex;

  }

  .clues {
    flex-direction: column;
    margin: 10px;
  }
</style>
</head>

<script>
function checkCrossword() {
  const inputs = document.querySelectorAll('.cell input');
  let correct = true;
  inputs.forEach(input => {
    if (input.dataset.letter && input.value.toUpperCase() !== input.dataset.letter) {
      input.style.background = '#f88';
      correct = false;
    } else if(input.dataset.letter) {
      input.style.background = '#8f8';
    }
  });
  if (correct) alert('Поздравляем! Кроссворд разгадан!');
}
</script>
