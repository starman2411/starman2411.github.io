<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Калькулятор камер</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      height: 100vh;
    }
    .sidebar {
      width: 300px;
      padding: 20px;
      background: #f4f4f4;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }
    .inputs label, .outputs label {
      display: block;
      margin-top: 10px;
    }
    input {
      width: 100%;
      padding: 5px;
      margin-top: 5px;
    }
    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      background: #0077cc;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #005fa3;
    }
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px;
    }
    .image-block {
      width: 80%;
      margin-bottom: 20px;
      text-align: center;
    }
    .image-block img {
      max-width: 100%;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    .overlay-container {
  position: relative;
  display: inline-block;
}
.overlay-container img {
  display: block;
  max-width: 100%;
}
#overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  background: rgba(0, 255, 0, 0.4);
  height: 0%; /* изначально пустой */
  pointer-events: none; /* чтобы клик проходил сквозь */
}
  </style>
</head>
<body>
  <div class="sidebar">
    <h3>Входные параметры</h3>
    <div class="inputs">
      <label>A - расстояние от камеры до куста, метры: <input type="number" id="A" value="0.8"></label>
      <label>L - длина одной линии, м: <input type="number" id="L" value="50"></label>
      <label>V - скорость тележки, м/с: <input type="number" id="V" value="0.03"></label>
      <label>FOV - вертикальное поле зрения, градусы: <input type="number" id="FOV" value="40"></label>
      <label>N - количество камер (в вертикальной плоскости): <input type="number" id="N" value="1"></label>
      <label>H - высота куста, м: <input type="number" id="H" value="4"></label>
    </div>

    <button onclick="calculate()">Рассчитать</button>

    <h3>Выходные параметры</h3>
    <div class="outputs">
      <label>Процент покрытия (в вертикальной плоскости): <span id="Q">-</span></label>
      <label>Время съёмки одной линии (минуты): <span id="t">-</span></label>
    </div>
  </div>

  <div class="content">
    <div class="image-block">
  <h4>Результат</h4>
  <div class="overlay-container">
    <img id="resultImage" src="images/im2.png" alt="Результат">
    <div id="overlay"></div>
  </div>
</div>
    <div class="image-block">
      <h4>Схема</h4>
      <img src="images/im1.png" alt="Схема">
    </div>

  </div>

  <script>
    function getTanDeg(deg) {
      var rad = (deg * Math.PI) / 180;
      return Math.tan(rad);
    }

    function calculate() {

      // Считываем входные значения
      const A = parseFloat(document.getElementById('A').value);
      const L = parseFloat(document.getElementById('L').value);
      const V = parseFloat(document.getElementById('V').value);
      const FOV = parseFloat(document.getElementById('FOV').value);
      const N = parseFloat(document.getElementById('N').value);
      const H = parseFloat(document.getElementById('H').value);

      // Примерные формулы (замени на свои)
      const h = 2*A*getTanDeg(FOV/2)*N;
      const Q = (h/H*100).toFixed(2);
      const t = (L/V/60).toFixed(2);

      // Вывод
      document.getElementById('Q').innerText = Q;
      document.getElementById('t').innerText = t;


      const fill = Math.min(Q, 100);
document.getElementById('overlay').style.height = fill + "%";
    }
  </script>
</body>
</html>
