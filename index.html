/* Убираем отступы */
body {
    margin: 0;

}
.crossword-but {
    margin-bottom:20px;
}
  .crossword {
    display: grid;
    grid-template-columns: repeat(11, 35px);
    grid-template-rows: repeat(11, 35px);
    gap: 2px;
    margin: 10px;
/*    margin-bottom: 20px;*/
  }
  .cell {
    position: relative;
    width: 35px;
    height: 35px;
    border: 2px solid #333;
    background: #fff;



  }
  .cell input {
    width: 100%;
    height: 100%;
    border: none;
    text-align: center;
    font-size: 20px;
    text-transform: uppercase;
    padding: 0px;
    background: linear-gradient(
        180deg,
        #5b5f63,
        #2d3237
    );

    border: 1px solid black;
    border-bottom: 2px solid #000;

    color: #e5e5e5;
  }
  .cell.black {
    background: rgba(0, 0, 0, 0);
    border: none;
  }
  .number {
    position: absolute;
    top: 2px;
    left: 2px;
    font-size: 12px;
    color: #fff;

  }
 
  .clues div {
    max-width: 250px;
  }
  button {
    padding: 10px 20px;
    font-size: 16px;


    
        background:linear-gradient(
        180deg,
        #5b5f63,
        #2d3237
    );

    border:1px solid #1a1d20;
    border-bottom:2px solid #000;
    color:#e5e5e5;

    padding:10px 22px;
    margin:6px;
    font-size:14px;
    letter-spacing:0.5px;

    border-radius:4px;
    cursor:pointer;

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 2px 10px rgba(0,0,0,0.6);

    transition:all .15s ease;
  }


button:hover{
    background:linear-gradient(
        180deg,
        #6a6f74,
        #343a40
    );

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        0 0 12px rgba(255,120,50,0.25);
}

/* нажатие */
button:active{
    transform:translateY(2px);
    box-shadow:
        inset 0 3px 8px rgba(0,0,0,0.8);
}

  .crossword-wrapper {
    display: flex;

    height: 100%;

/*    justify-content: space-between;*/

/* Пасхальные карточки */

.card {
    position: absolute;
    width: 30px;
    height: 50px;
    z-index: 1;
    perspective: 600px;
}

.card-inner {
    width: 100%;
    height: 100%;
    position: relative;

    transform-style: preserve-3d;
    transition: transform 0.6s;

    cursor: pointer;
}

.card.flipped .card-inner {
    transform: rotateY(180deg);
}

.card-face {
    position: absolute;
    width: 100%;
    height: 100%;

    backface-visibility: hidden;

}
.card-front img {
        opacity: 20%;

}
.card-front img,
.card-back img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card-back {

}

<script>

let hideall = false;
const r = document.getElementById("r")
const g = document.getElementById("g")
const b = document.getElementById("b")
const box = document.getElementById("rgbBox")

function updateColor(){

    const rv = r.value || 0
    const gv = g.value || 0
    const bv = b.value || 0

    box.style.background = `rgb(${rv},${gv},${bv})`
}

r.addEventListener("input", updateColor)
g.addEventListener("input", updateColor)
b.addEventListener("input", updateColor)


/* Переворот карточек */

document.querySelectorAll(".card").forEach(card => {

    card.addEventListener("click", () => {
        card.classList.toggle("flipped")
    })

})

let lock1_opened = 0;
let lock2_opened = 0;
let lock3_opened = 0;
let lock4_opened = 0;
let lock5_opened = 0;
let lock6_opened = 0;


const scene = document.querySelector(".scene");


function checkCrossword() {
  const inputs = document.querySelectorAll('.cell input');
  let correct = true;
  inputs.forEach(input => {
    if (input.dataset.letter && input.value.toUpperCase() !== input.dataset.letter) {
      input.style.background = '#f88';
      correct = false;
